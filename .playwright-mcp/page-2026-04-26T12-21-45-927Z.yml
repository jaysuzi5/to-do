  - generic:
    - generic: Games & trivia experiences include skills like games, game information, and knowledge & trivia. You can build these with our custom model and pre-built templates.
  - generic:
    - generic: Movies & TV experience includes skills around movie & tv games, reviews, and trivia. You can either use the video skill model kit or the custom model to build these types of skills.
  - generic:
    - generic: Music & Audio experiences include skills like music, podcasts, and radio skills. All three can be built using our music skill model or custom model.
  - generic:
