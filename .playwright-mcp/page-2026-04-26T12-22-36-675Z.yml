    - generic: Food & drink experiences include skills around cooking, receipies, and restaurant booking. You can build these with our food ordering model or custom model with pre-built templates.
  - generic:
    - generic: Games & trivia experiences include skills like games, game information, and knowledge & trivia. You can build these with our custom model and pre-built templates.
  - generic:
    - generic: Movies & TV experience includes skills around movie & tv games, reviews, and trivia. You can either use the video skill model kit or the custom model to build these types of skills.
  - generic:
    - generic: Music & Audio experiences include skills like music, podcasts, and radio skills. All three can be built using our music skill model or custom model.
  - generic:
    - generic: News experiences include news skills and flash briefings. You can build these experiences with our flash briefing skill model or custom model.
  - generic:
    - generic: Smart home experiences can be built using our smart home skill model or our custom model.
  - generic:
    - generic: If your skill doesn’t fit any of the experience groups that are listed, then select this option to see all models.