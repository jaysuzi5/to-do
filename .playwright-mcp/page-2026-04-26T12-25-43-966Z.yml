                        - generic [ref=e529]:
                          - strong [ref=e530]: "Note:"
                          - text: Not following the rules and guidelines mentioned below can result in certification failure.
                        - generic [ref=e532]:
                          - text: Any changes to your skill's invocation name will not take effect until you have built your skill's interaction model. In order to successfully build, your skill's interaction model must contain an intent with at least one sample utterance. Ensure that your invocation name follows the rules below.
                          - list [ref=e533]:
                            - listitem [ref=e534]: One-word invocation names are allowed only when it is unique to your brand/intellectual property and proof of rights is provided in the testing instructions.
                            - listitem [ref=e535]: Two-word invocation names should not contain articles (“a”, “an” or “the”) or preposition ("for", "to", "of," "about," "up," "by," "at," "off," "with"). For example, "a bicycle", "an espresso", "to amuse", "for fun".
                          - strong [ref=e536]: Ensure that the invocation name...
                          - list [ref=e537]:
                            - listitem [ref=e538]: Is written in each language you choose to support. For example, the German version of your skill must have an invocation name written in German
                            - listitem [ref=e539]: Doesn’t spell out phonemes. Do not forget the period after the last letter in such cases. For example, a skill titled "AWS Facts" would need "AWS" represented as "a. w. s. " and NOT "ay double u ess." Or “a w s” or “aws”.
                            - listitem [ref=e540]: "Contains only lower-case alphabetic characters, spaces and possessive apostrophes (Example: “sam’s science trivia”). Numbers should also be spelled out (Example: “twenty-one”)."
                            - listitem [ref=e541]: Is specific to the functionality of the skill, unless the invocation name is unique to your brand or intellectual property (for example, "echo", "audible"). One way to achieve relevance is to qualify the invocation name with something that describes the skill's functionality or something relevant to your company/developer name. For example, "boston transit", "cricket trivia", "math tutor", "magic eight ball", "baby stats", "tim's jokes".
                            - listitem [ref=e542]: Does not contain wake words for example - “Alexa”, “Echo”, or the words “skill” and “app”.
                            - listitem [ref=e543]: Does not contain any of the Alexa skill launch phrases and connecting words. Launch phrases include "run," "start," "play," "resume," "use," "launch," "ask," "open," "tell," "load," "begin," "enable" and “talk to”. Connecting words examples include "to," "from," "in," "using," "with," "about," "for," "that," "by," "if," "and," "whether."
                            - listitem [ref=e544]: "Does not contains any proper nouns (Example: “molly”, “Seattle”) unless it is followed by other words (Example: “molly’s horoscope”, “seattle’s spotlight”, “sam’s market”)."
                            - listitem [ref=e545]: "Does not infringe on third-party trademark/ brand unless you are permitted to use and provide proof of rights in the testing instructions. Otherwise you may use the brand name in a referential manner that doesn’t imply ownership, for example: “facts for a. w. s.” or “facts about a. w. s.”"
