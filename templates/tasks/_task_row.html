<div class="list-group-item d-flex align-items-center gap-3 py-3 px-0">
    <form method="post" action="{% url 'task_toggle' task.pk %}">
        {% csrf_token %}
        <button type="submit" class="border-0 bg-transparent p-0 lh-1">
            <i class="bi {% if task.is_complete %}bi-check-circle-fill text-success{% else %}bi-circle text-muted{% endif %} fs-5"></i>
        </button>
    </form>
    <a href="{% url 'task_edit' task.pk %}"
       class="flex-grow-1 text-decoration-none {% if task.is_complete %}text-muted{% else %}text-body{% endif %}">
        <span {% if task.is_complete %}style="text-decoration:line-through"{% endif %}>{{ task.title }}</span>
    </a>
</div>
