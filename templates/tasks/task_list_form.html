{% extends "base.html" %}

{% block title %}New List{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <nav aria-label="breadcrumb" class="mb-3">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="{% url 'dashboard' %}">Dashboard</a></li>
                <li class="breadcrumb-item active">New List</li>
            </ol>
        </nav>

        <div class="form-card">
            <h2 class="form-card-title">Create a New List</h2>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-medium" for="{{ form.name.id_for_label }}">List Name</label>
                    {{ form.name }}
                    {% if form.name.errors %}<div class="invalid-feedback d-block">{{ form.name.errors|join:", " }}</div>{% endif %}
                </div>
                <div class="mb-4">
                    <label class="form-label fw-medium" for="{{ form.description.id_for_label }}">Description <span class="text-muted fw-normal">(optional)</span></label>
                    {{ form.description }}
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-plus-lg me-1"></i>Create List
                    </button>
                    <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
