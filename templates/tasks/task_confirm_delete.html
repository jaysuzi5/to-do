{% extends "base.html" %}

{% block title %}Delete Task{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="form-card border-danger">
            <h2 class="form-card-title text-danger"><i class="bi bi-exclamation-triangle me-2"></i>Delete Task</h2>
            <p>Are you sure you want to delete <strong>"{{ object.title }}"</strong>?</p>
            <p class="text-muted small">From list: {{ object.task_list.name }}</p>
            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash me-1"></i>Delete Task
                    </button>
                    <a href="{% url 'task_list_detail' object.task_list.slug %}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
